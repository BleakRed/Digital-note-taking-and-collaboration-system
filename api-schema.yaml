                    type: array
                    items: { $ref: "#/components/schemas/Folder" }
                  files:
                    type: array
                    items: { $ref: "#/components/schemas/FileEntry" }

    post:
      tags: [Files]
      summary: Upload file (multipart)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
